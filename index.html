<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mia妙言 - 玄学实验室</title>

    <meta property="og:title" content="Mia妙言 | 你的底层代码解析器">
    <meta property="og:description" content="用科技拆解玄学，解码你的核心能量原型。">
    <meta property="og:image" content="https://www.mia-xuanxue.fun/bg.jpg">

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <style>
        /* --- 视觉外壳 --- */
        body {
            background-image: url('bg.jpg'); background-size: cover; background-position: center;
            background-attachment: fixed; margin: 0; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        }

        .app-container {
            background-color: rgba(10, 15, 30, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; padding: 30px 20px; width: 90%; max-width: 400px;
            max-height: 90vh; overflow-y: auto; border: 1px solid rgba(217, 119, 6, 0.4);
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.3), inset 0 0 10px rgba(217, 119, 6, 0.2);
            position: relative;
            scroll-behavior: smooth;
        }

        .app-container::-webkit-scrollbar { width: 4px; }
        .app-container::-webkit-scrollbar-thumb { background: #2563EB; border-radius: 10px; }

        /* --- Logo 与 标题区 --- */
        .header-section { text-align: center; margin-bottom: 25px; }
        .logo-img {
            width: 140px; height: 140px; object-fit: cover; margin-bottom: 5px;
            filter: drop-shadow(0 0 15px rgba(217, 119, 6, 0.6));
            -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 70%);
            mask-image: radial-gradient(circle at center, black 45%, transparent 70%);
        }
        .title { color: #D97706; font-size: 18px; margin: 0; font-weight: 600; letter-spacing: 2px; }
        .lab-title { color: #F59E0B; font-size: 34px; margin: 5px 0; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 20px rgba(217, 119, 6, 0.6); }
        .subtitle { color: #93C5FD; font-size: 13px; opacity: 0.8; text-align: center;}

        /* --- 输入页控件 --- */
        .form-group { margin-bottom: 24px; }
        label { display: block; color: #FCD34D; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        .date-inputs { display: flex; gap: 10px; }
        select {
            width: 100%; padding: 14px 10px; background-color: rgba(37, 99, 235, 0.15); 
            border: 1px solid #2563EB; border-radius: 10px; color: #FDE68A; font-size: 15px; text-align: center; -webkit-appearance: none; appearance: none;
        }

        /* --- 核心按钮 (金色渐变) --- */
        .submit-btn {
            width: 100%; padding: 15px 16px; margin-top: 10px; background: linear-gradient(135deg, #D97706, #b45309);
            color: #ffffff; border: 1px solid #F59E0B; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4); transition: transform 0.1s;
        }
        .submit-btn:hover { background: linear-gradient(135deg, #F59E0B, #D97706); }
        .submit-btn:active { transform: scale(0.98); }

        /* --- 解析结果界面 --- */
        #result-screen { display: none; text-align: left; animation: fadeIn 0.8s ease forwards; }
        .res-header { text-align: center; border-bottom: 1px solid rgba(217, 119, 6, 0.3); padding-bottom: 20px; margin-bottom: 20px;}
        .res-subtitle { color: #93C5FD; font-size: 12px; margin-bottom: 5px; letter-spacing: 1px;}
        .res-title { color: #D97706; font-size: 36px; font-weight: 900; margin: 0; text-shadow: 0 0 15px rgba(217, 119, 6, 0.6); }
        .res-tag { color: #FCD34D; font-size: 18px; margin-top: 5px; font-weight: bold; letter-spacing: 2px;}

        .data-card {
            background-color: rgba(15, 23, 42, 0.6); border: 1px solid rgba(37, 99, 235, 0.3); border-radius: 12px;
            padding: 16px; margin-bottom: 16px; box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .card-title { color: #F59E0B; font-size: 14px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        .card-content { font-size: 14px; line-height: 1.6; color: #DBEAFE; }
        .highlight-text { color: #60A5FA; font-weight: 500; }

        /* --- 海报预览/下载弹窗 --- */
        #poster-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; justify-content: center; align-items: center;
        }
        #poster-img { width: 85%; border-radius: 10px; box-shadow: 0 0 30px #000; margin-bottom: 20px; max-height: 80vh; object-fit: contain; }
        .close-poster { color: #fff; border: 1px solid #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        /* --- 隐藏的海报生成模板 (完全适配 16:9 手机比例) --- */
        #poster-template {
            position: absolute; left: -9999px; width: 375px; 
            background: #0a0f1e url('bg.jpg') center center / cover no-repeat;
            padding: 40px 25px; box-sizing: border-box;
        }
        /* 海报Logo修复：完全保持首页的处理方式和大小感 */
        .poster-logo-img {
            width: 100px; height: 100px; object-fit: cover; margin-bottom: 5px;
            /* 核心修复：移除硬边框，增加过度融入的光晕和径向渐变融合效果 */
            filter: drop-shadow(0 0 15px rgba(217, 119, 6, 0.6));
            -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 70%);
            mask-image: radial-gradient(circle at center, black 45%, transparent 70%);
        }
        /* 海报卡片区：加深底色降低透明度，增加高级边框阴影，确保文字清晰 */
        .poster-glass-card {
            margin-top: 30px;
            background-color: rgba(10, 15, 30, 0.9); /* 降低透明度确保文字清晰 */
            border: 1px solid rgba(217, 119, 6, 0.4); border-radius: 15px;
            padding: 25px; box-sizing: border-box;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.3), inset 0 0 15px rgba(217, 119, 6, 0.2);
        }
        .poster-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 40px; border-top: 1px solid rgba(217,119,6,0.3); padding-top: 20px; }
        .qr-code { width: 80px; height: 80px; background: white; padding: 5px; border-radius: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="poster-template">
        <div style="text-align:center;">
            <img src="logo.jpg" class="poster-logo-img">
            <div style="color:#D97706; font-size:18px; font-weight: bold; margin-top:5px; letter-spacing: 2px;">Mia妙言 · 玄学实验室</div>
        </div>
        <div class="poster-glass-card">
            <div style="text-align:center; border-bottom: 1px solid rgba(37,99,235,0.3); padding-bottom: 15px; margin-bottom: 20px;">
                <div style="color:#93C5FD; font-size:12px; letter-spacing:1px; margin-bottom:5px;">你的核心能量原型是</div>
                <div id="post-name" style="color:#D97706; font-size:48px; font-weight:900; margin:0;">-</div>
                <div id="post-tag" style="color:#FCD34D; font-size:18px; font-weight:bold;">The Oak · 创世架构师</div>
            </div>
            <div style="color:#F59E0B; font-weight:bold; margin-bottom:8px; font-size: 15px;">💻 底层代码</div>
            <div id="post-core" style="font-size:14px; line-height:1.6; color:#DBEAFE; margin-bottom:15px; color:#60A5FA;">-</div>
            <div style="color:#F59E0B; font-weight:bold; margin-bottom:8px; font-size: 15px;">🛡️ 核心天赋概要</div>
            <div id="post-synopsis" style="font-size:14px; line-height:1.6; color:#DBEAFE;">向上生长、正直独立、自带主角领导力。</div>
        </div>
        <div class="poster-footer">
            <div style="color:#FDE68A; font-size:12px;">
                <p style="margin:0; font-weight: bold; font-size: 13px;">💡 解码你的专属赛博生命剧本</p>
                <p style="margin:5px 0 0 0; opacity:0.8; letter-spacing: 1px;">www.mia-xuanxue.fun</p>
            </div>
            <div id="qrcode" class="qr-code"></div>
        </div>
    </div>

    <div id="poster-overlay">
        <p style="color:#FCD34D; margin-bottom:10px; font-size: 15px; font-weight: bold;">长按上方图片保存，分享到朋友圈</p>
        <img id="poster-img" src="">
        <div class="close-poster" onclick="closePoster()">返回实验室</div>
    </div>

    <div class="app-container" id="mainContainer">
        <div id="input-screen">
            <div class="header-section">
                <img src="logo.jpg" class="logo-img" onerror="this.style.display='none'">
                <div class="title">MIA 妙言</div>
                <h1 class="lab-title">玄学实验室</h1>
                <div class="subtitle">数字化人生剧本解析系统</div>
            </div>
            <div class="form-group">
                <label>出生日期 (公历) <span style="color:#2563EB;">*</span></label>
                <div class="date-inputs"><select id="year"></select><select id="month"></select><select id="day"></select></div>
            </div>
            <div class="form-group">
                <label>出生时辰 (可选)</label>
                <select id="birthTime"><option value="unknown">未知时辰 (跳过)</option><option value="zi">子时 (23:00-01:00)</option><option value="chou">丑时 (01:00-03:00)</option><option value="yin">寅时 (03:00-05:00)</option><option value="mao">卯时 (05:00-07:00)</option><option value="chen">辰时 (07:00-09:00)</option><option value="si">巳时 (09:00-11:00)</option><option value="wu">午时 (11:00-13:00)</option><option value="wei">未时 (13:00-15:00)</option><option value="shen">申时 (15:00-17:00)</option><option value="you">酉时 (17:00-19:00)</option><option value="xu">戌时 (19:00-21:00)</option><option value="hai">亥时 (21:00-23:00)</option></select>
            </div>
            <button class="submit-btn" onclick="startDataParsing()">⚡ 注入算力 · 解码我的底层剧本</button>
        </div>

        <div id="result-screen">
            <div class="res-header">
                <div class="res-subtitle">DECODING COMPLETE</div>
                <div class="res-title" id="res-name">-</div>
                <div class="res-tag" id="res-tag">-</div>
            </div>
            <div class="data-card">
                <div class="card-title">💻 底层代码 (Core Code)</div>
                <div class="card-content highlight-text" id="res-core">加载中...</div>
            </div>
            <div class="data-card">
                <div class="card-title">🌟 核心能量共鸣名人</div>
                <div class="card-content" id="res-celebs">加载中...</div>
            </div>
            <button class="submit-btn" onclick="generatePoster()" style="background: linear-gradient(135deg, #2563EB, #1d4ed8); border-color: #60A5FA; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); margin-bottom: 15px;">📸 生成我的能量图鉴 (下载图片)</button>
            <button class="submit-btn" onclick="returnToInput()" style="background:transparent; border:1px solid #2563EB; color:#93C5FD; box-shadow:none; margin-bottom: 20px;">↺ 重新解码</button>
        </div>
    </div>

    <script>
        // 初始化日期选择
        const yearSelect = document.getElementById('year'), monthSelect = document.getElementById('month'), daySelect = document.getElementById('day');
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y >= 1930; y--) { yearSelect.add(new Option(y + '年', y)); }
        for (let m = 1; m <= 12; m++) { monthSelect.add(new Option(m + '月', m)); }
        for (let d = 1; d <= 31; d++) { daySelect.add(new Option(d + '日', d)); }
        yearSelect.value = "1995"; monthSelect.value = "6"; daySelect.value = "15";

        // 初始化海报里的二维码
        new QRCode(document.getElementById("qrcode"), { text: "https://www.mia-xuanxue.fun", width: 80, height: 80, colorDark : "#000000", colorLight : "#ffffff" });

        // 数据字典：确保文案在 UI 和海报中完全一致
        const archetypes = [
            { stem: "甲木", tag: "参天大树型 · 架构师", core: "向上生长直达天际。正直独立、能扛责任，自带主角领导力。宁折不弯，拒绝弯弯绕绕。", synopsis: "正直独立、能扛事、目标感强、抗压。宁折不弯，拒绝弯弯绕绕。", celebs: "埃隆·马斯克、岳飞、刘涛" },
            { stem: "乙木", tag: "柔韧藤蔓型 · 连接者", core: "善于建立联结编织网络。极其敏锐柔韧，能适应任何生态，以柔克刚达成目的。", synopsis: "极其敏锐柔韧、高情商、审美艺术、曲线救国。以柔克刚达成目的。", celebs: "奥黛丽·赫本、胡歌、林徽因" },
            { stem: "丙火", tag: "核心恒星型 · 发光体", core: "系统的恒星级能源。热情开朗布道，能量直接而开源。讨厌阴暗面，点燃全场气氛。", synopsis: "热情开朗、真诚直接、义气慷慨。讨厌阴暗面，点燃全场气氛。", celebs: "李白、莱昂纳多(小李子)、谢娜" },
            { stem: "丁火", tag: "灵感星光型 · 启明者", core: "灵动多变富有灵气。眼神温柔但内心专注，能看透表象直击灵魂。越看越有味道。", synopsis: "精致温柔灵气、深度洞察、外柔内刚。能看透表象直击灵魂。", celebs: "泰勒·斯威夫特、周杰伦、貂蝉" },
            { stem: "戊土", tag: "矩阵压舱石 · 高山型", core: "承载万亿参数的物理服务器集群。厚重可靠诚信务实，行动胜于雄辩。", synopsis: "厚重可靠、诚信务实、包容长期主义。行动胜于雄辩。", celebs: "沃伦·巴菲特、董明珠、安格拉·默克尔" },
            { stem: "己土", tag: "算法培育者 · 田园型", core: "细心察觉察系统的每一个微小进程。低调务实不争抢算力，默默付出在后台。", synopsis: "细心察觉、体贴照顾、规划收纳一流。低调务实不争抢算力，默默付出。", celebs: "凯特王妃、黄磊、特蕾莎修女" },
            { stem: "庚金", tag: "破局利剑型 · 改革指令", core: "最高执行权限的杀毒软件。硬核锋利讨厌拖泥带水。不畏强权原则性强。", synopsis: "锐利果断硬核、执行力强、不破不立。不畏强权原则性强。", celebs: "关羽、那英、C罗" },
            { stem: "辛金", tag: "像素级珠玉型 · 完美主义", core: "顶级UI界面像素级雕琢者。细节控毒舌但心软，追求精神与物质双重高级感。", synopsis: "精致优雅、细节完美主义、高阶审美。追求精神与物质双重高级感。", celebs: "杨贵妃、梁朝伟、安妮·海瑟薇" },
            { stem: "壬水", tag: "全局浪潮型 · 宏观算法", core: "不受边界限制。智慧通透学习力强，永远全局视角看问题，驾驭海量数据与趋势。", synopsis: "智慧通透洒脱大气、宏观演算、动态适应力。驾驭海量数据与趋势。", celebs: "诸葛亮、高圆圆、爱因斯坦" },
            { stem: "癸水", tag: "幽灵观察者 · 雨露型", core: "悄无声息能穿透任何防火墙。直觉力情绪算力惊人，最擅长迂回包抄达成目的。", synopsis: "清冷细腻、藏智共情、情绪客黑客、深谋远虑。最擅长迂回包抄达成目的。", celebs: "基努·里维斯、刘亦菲、阿兰·图灵" }
        ];

        function startDataParsing() {
            const y = parseInt(yearSelect.value), m = parseInt(monthSelect.value), d = parseInt(daySelect.value);
            const dateStr = y + "年" + m + "月" + d + "日";
            const targetDate = new Date(y, m - 1, d), baseDate = new Date(2024, 0, 1); 
            const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
            let stemIndex = diffDays % 10; if (stemIndex < 0) stemIndex += 10; 
            const result = archetypes[stemIndex];

            // 注入数据到 UI
            document.getElementById('input-screen').style.display='none';
            document.getElementById('result-screen').style.display='block';
            document.getElementById('res-name').innerText = result.stem;
            document.getElementById('res-tag').innerText = "The " + result.tag.split(' · ')[0] + " · " + result.tag.split(' · ')[1];
            document.getElementById('res-core').innerText = result.core;
            document.getElementById('res-celebs').innerText = result.celebs;
            document.getElementById('mainContainer').scrollTop = 0;

            // 同时将数据注入到隐藏的海报模板（确保两者文案绝对一致）
            document.getElementById('post-name').innerText = result.stem;
            document.getElementById('post-tag').innerText = "The " + result.tag.split(' · ')[0] + " · " + result.tag.split(' · ')[1];
            document.getElementById('post-core').innerText = result.core;
            document.getElementById('post-synopsis').innerText = result.synopsis;
        }

        // 📸 核心功能：生成海报图片
        function generatePoster() {
            document.getElementById('loading-overlay').style.display = 'flex'; // 显示加载指示
            const template = document.getElementById('poster-template');
            
            // 截图配置：提高清晰度，强制深色背景（适配截图插件）
            html2canvas(template, {
                useCORS: true, 
                scale: 3, 
                backgroundColor: '#0a0f1e', // 适配bg.jpg的深色底
                logging: true // 如果不 work 可以打开它看报错
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                document.getElementById('poster-img').src = imgData;
                document.getElementById('poster-overlay').style.display = 'flex';
                document.getElementById('loading-overlay').style.display = 'none';
            });
        }

        function closePoster() { document.getElementById('poster-overlay').style.display='none'; }
        function returnToInput() { location.reload(); }
    </script>
</body>
</html>
