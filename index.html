<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mia妙言 - 玄学实验室</title>

    <meta name="description" content="Mia妙言：赛博玄学实验室。用数学、逻辑与代码，深度解析你的十维能量原型。">
    <meta property="og:title" content="Mia妙言 | 你的底层代码解析器">
    <meta property="og:description" content="输入坐标，启动算力。立刻解码你的核心能量原型。">
    <meta property="og:image" content="https://www.mia-xuanxue.fun/bg.jpg">
    <meta property="og:url" content="https://www.mia-xuanxue.fun/">
    <meta property="og:type" content="website">

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        /* --- 视觉外壳 --- */
        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            color: #fff;
        }

        .app-container {
            background-color: rgba(10, 15, 30, 0.75); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px 25px; 
            width: 100%;
            max-width: 400px;
            max-height: 90vh; 
            overflow-y: auto; 
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.3), inset 0 0 10px rgba(217, 119, 6, 0.2);
            border: 1px solid rgba(217, 119, 6, 0.4); 
            box-sizing: border-box;
            position: relative;
            scroll-behavior: smooth;
        }

        /* 隐藏滚动条但保留功能 */
        .app-container::-webkit-scrollbar { width: 4px; }
        .app-container::-webkit-scrollbar-thumb { background: #2563EB; border-radius: 10px; }

        /* --- Logo 与 标题 --- */
        .header-section { text-align: center; margin-bottom: 25px; }
        .logo-img {
            width: 140px; height: 140px; object-fit: cover; margin-bottom: 5px; 
            filter: drop-shadow(0 0 15px rgba(217, 119, 6, 0.6));
            -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 70%);
            mask-image: radial-gradient(circle at center, black 45%, transparent 70%);
        }
        .title { color: #D97706; font-size: 20px; margin: 0; font-weight: 600; letter-spacing: 2px; opacity: 0.9; }
        .lab-title { color: #F59E0B; font-size: 34px; margin: 5px 0; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 20px rgba(217, 119, 6, 0.6); }
        .subtitle { color: #93C5FD; font-size: 13px; opacity: 0.8; }

        /* --- 输入页样式 --- */
        .form-group { margin-bottom: 24px; }
        label { display: block; color: #FCD34D; font-size: 14px; margin-bottom: 8px; }
        .date-inputs { display: flex; gap: 10px; }
        select {
            width: 100%; padding: 14px 10px; background-color: rgba(37, 99, 235, 0.15); 
            border: 1px solid #2563EB; border-radius: 10px; color: #FDE68A; font-size: 15px; appearance: none; text-align: center;
        }

        /* --- 按钮设计 --- */
        .submit-btn {
            width: 100%; padding: 15px 16px; margin-top: 10px; background: linear-gradient(135deg, #D97706, #b45309);
            color: #ffffff; border: 1px solid #F59E0B; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .share-btn {
            background: linear-gradient(135deg, #2563EB, #1d4ed8);
            border-color: #60A5FA;
            margin-bottom: 15px;
        }

        /* --- 结果页样式 --- */
        #result-screen { display: none; text-align: left; animation: fadeIn 0.8s ease forwards; }
        .res-header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(37, 99, 235, 0.4); padding-bottom: 20px; }
        .res-logo { width: 70px; height: 70px; object-fit: cover; filter: drop-shadow(0 0 10px rgba(217, 119, 6, 0.6)); -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 70%); }
        .res-title { color: #D97706; font-size: 32px; font-weight: 900; margin: 10px 0 0 0; }
        .res-tag { color: #FCD34D; font-size: 18px; font-weight: bold; }

        .data-card {
            background-color: rgba(15, 23, 42, 0.6); border: 1px solid rgba(37, 99, 235, 0.3); border-radius: 12px;
            padding: 16px; margin-bottom: 16px;
        }
        .card-title { color: #F59E0B; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .card-content { color: #DBEAFE; font-size: 14px; line-height: 1.6; }
        .card-content ul { margin: 0; padding-left: 18px; color: #93C5FD; }
        .highlight-text { color: #60A5FA; font-weight: 500; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 加载状态指示器 */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; color: #FCD34D;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">正在生成你的能量图鉴...</div>

    <div class="app-container" id="mainContainer">
        <div id="input-screen">
            <div class="header-section">
                <img src="logo.jpg" class="logo-img" onerror="this.style.display='none'">
                <div class="title">Mia妙言</div>
                <h1 class="lab-title">玄学实验室</h1>
                <div class="subtitle">数字化人生剧本解析系统</div>
            </div>

            <div class="form-group">
                <label>出生日期 (公历)</label>
                <div class="date-inputs">
                    <select id="year"></select>
                    <select id="month"></select>
                    <select id="day"></select>
                </div>
            </div>

            <div class="form-group">
                <label>出生时辰 (可选)</label>
                <select id="birthTime">
                    <option value="unknown">未知时辰 (跳过)</option>
                    <option value="zi">子时 (23:00-00:59)</option>
                    <option value="chou">丑时 (01:00-02:59)</option>
                    <option value="yin">寅时 (03:00-04:59)</option>
                    <option value="mao">卯时 (05:00-06:59)</option>
                    <option value="chen">辰时 (07:00-08:59)</option>
                    <option value="si">巳时 (09:00-10:59)</option>
                    <option value="wu">午时 (11:00-12:59)</option>
                    <option value="wei">未时 (13:00-14:59)</option>
                    <option value="shen">申时 (15:00-16:59)</option>
                    <option value="you">酉时 (17:00-18:59)</option>
                    <option value="xu">戌时 (19:00-20:59)</option>
                    <option value="hai">亥时 (21:00-22:59)</option>
                </select>
            </div>

            <button class="submit-btn" onclick="startDataParsing()">⚡ 注入算力 · 解码我的底层剧本</button>
        </div>

        <div id="result-screen">
            <div id="capture-area" style="padding: 10px; border-radius: 15px;">
                <div class="res-header">
                    <img src="logo.jpg" class="res-logo" onerror="this.style.display='none'">
                    <div class="res-subtitle">—— 你的底层能量原型是 ——</div>
                    <div class="res-title" id="res-name">-</div>
                    <div class="res-tag" id="res-tag">-</div>
                </div>

                <div class="data-card">
                    <div class="card-title">💻 底层代码</div>
                    <div class="card-content highlight-text" id="res-core">-</div>
                </div>

                <div class="data-card">
                    <div class="card-title">⚙️ 内核算法</div>
                    <div class="card-content" id="res-inner">-</div>
                </div>

                <div class="data-card">
                    <div class="card-title">🌟 能量共振样本</div>
                    <div class="card-content" id="res-celebs">-</div>
                </div>
            </div>

            <button class="submit-btn share-btn" onclick="generatePoster()">📸 保存结果海报 (朋友圈)</button>
            <button class="submit-btn" onclick="returnToInput()" style="background:transparent; border:1px solid #2563EB; color:#93C5FD; box-shadow:none; margin-bottom: 20px;">↺ 重新输入参数</button>
        </div>
    </div>

    <script>
        // 初始化日期选择
        const yearSelect = document.getElementById('year');
        const monthSelect = document.getElementById('month');
        const daySelect = document.getElementById('day');
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y >= 1930; y--) { yearSelect.add(new Option(y + '年', y)); }
        for (let m = 1; m <= 12; m++) { monthSelect.add(new Option(m + '月', m)); }
        for (let d = 1; d <= 31; d++) { daySelect.add(new Option(d + '日', d)); }
        yearSelect.value = "1995"; monthSelect.value = "6"; daySelect.value = "15";

        const archetypes = [
            { stem: "甲木", tag: "The Oak · 创世架构师", core: "破土而出的第一行代码，自带向上生长的破局之力与绝对的系统主导权。", inner: "<ul><li>目标锁定：野心与担当并存</li><li>直筒逻辑：正直坦荡，宁折不弯</li><li>抗压满格：越压越强 (ENTJ)</li></ul>", celebs: "埃隆·马斯克、刘涛、岳飞" },
            { stem: "乙木", tag: "The Vine · 生态连接者", core: "蜿蜒生长的柔性网络，能将孤立的数据编织成生态系统。", inner: "<ul><li>高频共情：情绪读取能力满分</li><li>曲线救国：韧性极强，能屈能伸</li><li>审美天赋：艺术感天生在线 (ENFJ)</li></ul>", celebs: "奥黛丽·赫本、胡歌、林徽因" },
            { stem: "丙火", tag: "The Sun · 核心发光体", core: "系统中的恒星级能源，持续输出高燃热量，自带强大的辐射场。", inner: "<ul><li>高燃输出：外向开朗，真诚直接</li><li>情绪感染：瞬间点燃全场的气氛</li><li>慷慨开源：讲义气，乐于分享 (ENFP)</li></ul>", celebs: "莱昂纳多、谢娜、李白" },
            { stem: "丁火", tag: "The Star · 灵感启明者", core: "黑夜中的高亮像素，数据盲区里的探照灯；专攻底层逻辑。", inner: "<ul><li>深度洞察：看透事物表象直击灵魂</li><li>极致专注：有自己运行的小世界</li><li>外柔内刚：底层有坚固协议 (INFJ)</li></ul>", celebs: "泰勒·斯威夫特、周杰伦、貂蝉" },
            { stem: "戊土", tag: "The Mountain · 矩阵压舱石", core: "承载万亿参数的物理服务器集群，最厚重、最可靠的防御基石。", inner: "<ul><li>绝对稳健：诚信务实，行动胜于雄辩</li><li>海量包容：承载巨大压力与复杂情绪</li><li>长期主义：追求终极的系统稳定 (ISTJ)</li></ul>", celebs: "沃伦·巴菲特、董明珠、曾国藩" },
            { stem: "己土", tag: "The Garden · 算法培育者", core: "拥有超级收纳能力的田园数据库；擅长整理冗杂信息，滋养项目。", inner: "<ul><li>极致服务：细心体贴，照顾微小进程</li><li>低调务实：不争抢算力，默默付出</li><li>高效整理：统筹规划能力一流 (ISFJ)</li></ul>", celebs: "凯特王妃、黄磊、特蕾莎修女" },
            { stem: "庚金", tag: "The Sword · 破局终结者", core: "拥有最高执行权限的杀毒软件与改革指令；最擅长在混乱中重构秩序。", inner: "<ul><li>极简杀伐：果断直接，执行力拉满</li><li>非黑即白：极度讲求原则与逻辑</li><li>钢铁意志：不畏强权，不破不立 (ESTJ)</li></ul>", celebs: "C罗、那英、关羽" },
            { stem: "辛金", tag: "The Jade · 像素级雕琢者", core: "经过千万次迭代打磨的顶级UI界面；对精度和美感有苛刻要求。", inner: "<ul><li>完美主义：细节控晚期，零容忍</li><li>高阶审美：品味极佳，追求高级感</li><li>外冷内热：傲娇毒舌但心软 (ESFP)</li></ul>", celebs: "安妮·海瑟薇、梁朝伟、杨贵妃" },
            { stem: "壬水", tag: "The Ocean · 全局浪潮者", core: "席卷网络的流量洪流与宏大算法；善于驾驭海量数据与趋势。", inner: "<ul><li>宏观演算：智慧通透，永远全局视角</li><li>动态适应：随机应变，豁达不拘</li><li>冒险开拓：永远站在浪尖 (ENTP)</li></ul>", celebs: "理查德·布兰森、高圆圆、诸葛亮" },
            { stem: "癸水", tag: "The Dew · 幽灵观察者", core: "隐形数据流，能够穿透防火墙，拥有系统内最强的情绪算力。", inner: "<ul><li>情绪黑客：直觉力惊人，看穿人心</li><li>柔性渗透：低调不张扬，以柔克刚</li><li>深谋远虑：走一步算十步 (INTP)</li></ul>", celebs: "基努·里维斯、刘亦菲、阿兰·图灵" }
        ];

        function startDataParsing() {
            const y = parseInt(yearSelect.value);
            const m = parseInt(monthSelect.value);
            const d = parseInt(daySelect.value);
            const targetDate = new Date(y, m - 1, d);
            const baseDate = new Date(2024, 0, 1); 
            const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
            let stemIndex = diffDays % 10;
            if (stemIndex < 0) stemIndex += 10; 
            const result = archetypes[stemIndex];

            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            document.getElementById('res-name').innerText = result.stem;
            document.getElementById('res-tag').innerText = result.tag;
            document.getElementById('res-core').innerText = result.core;
            document.getElementById('res-inner').innerHTML = result.inner; 
            document.getElementById('res-celebs').innerText = result.celebs;
            document.getElementById('mainContainer').scrollTop = 0;
        }

        // 📸 核心功能：生成海报并下载
        function generatePoster() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex'; // 显示加载中

            const captureArea = document.getElementById('capture-area');
            
            // 使用 html2canvas 截图
            html2canvas(captureArea, {
                useCORS: true, // 允许跨域图片
                backgroundColor: '#1a1c23', // 海报背景色
                scale: 2, // 提高清晰度
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `Mia妙言_能量图鉴_${new Date().getTime()}.png`;
                link.href = imgData;
                link.click();
                overlay.style.display = 'none'; // 隐藏加载中
                alert('海报生成成功！请在下载管理中查看并分享至朋友圈。');
            }).catch(err => {
                console.error('海报生成失败:', err);
                overlay.style.display = 'none';
                alert('海报生成失败，请稍后再试。');
            });
        }

        function returnToInput() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('input-screen').style.display = 'block';
            document.getElementById('mainContainer').scrollTop = 0;
        }
    </script>
</body>
</html>
